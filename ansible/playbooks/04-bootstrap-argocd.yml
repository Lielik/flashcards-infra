---
# Minimal bootstrap of ArgoCD using declarative Kubernetes module
# After this, ArgoCD manages everything via GitOps

- name: Bootstrap ArgoCD (GitOps Control Plane)
  hosts: control_plane[0]
  become: true
  vars:
    # Bootstrap version - ArgoCD version to install
    # Ansible manages ArgoCD lifecycle
    # To upgrade: change this version and re-run playbook
    argocd_bootstrap_version: "v3.3.2"
    argocd_namespace: "argocd"
    gitops_repo: "https://github.com/Lielik/flashcards-gitops"
    kubeconfig_path: "/etc/kubernetes/admin.conf"

  tasks:
    # ==================== Step 1: Install ArgoCD (Declarative) ====================

    - name: Create ArgoCD namespace
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig_path }}"
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ argocd_namespace }}"

    - name: Check if ArgoCD is already installed
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: "{{ argocd_namespace }}"
        name: argocd-server
        kubeconfig: "{{ kubeconfig_path }}"
      register: argocd_check

    # Only install if not present - bootstrap operation only
    # Ansible manages ArgoCD lifecycle (not ArgoCD itself)
    # Upgrades happen by updating argocd_bootstrap_version and re-running this playbook

    - name: Download ArgoCD installation manifest
      get_url:
        url: "https://raw.githubusercontent.com/argoproj/argo-cd/{{ argocd_bootstrap_version }}/manifests/install.yaml"
        dest: /tmp/argocd-install.yaml
        mode: "0644"
      when: argocd_check.resources | length == 0

    - name: Install ArgoCD (minimal bootstrap)
      shell: |
        kubectl apply -n {{ argocd_namespace }} \
          --server-side --force-conflicts \
          -f /tmp/argocd-install.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      when: argocd_check.resources | length == 0
      register: argocd_install_result
      changed_when: "'created' in argocd_install_result.stdout or 'configured' in argocd_install_result.stdout"

    - name: Wait for ArgoCD server deployment to be ready
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: "{{ argocd_namespace }}"
        name: argocd-server
        kubeconfig: "{{ kubeconfig_path }}"
        wait: yes
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 300

    # ==================== Step 2: Apply Root Application from Git ====================

    - name: Download app-of-apps manifest from Git
      get_url:
        url: "{{ gitops_repo | replace('https://github.com', 'https://raw.githubusercontent.com') }}/main/bootstrap/app-of-apps.yaml"
        dest: /tmp/app-of-apps.yaml
        mode: "0644"

    - name: Apply root application (App-of-Apps)
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig_path }}"
        src: /tmp/app-of-apps.yaml
      register: root_app_result

    # ==================== Step 3: Get Access Information ====================

    - name: Get ArgoCD initial admin password
      kubernetes.core.k8s_info:
        kind: Secret
        namespace: "{{ argocd_namespace }}"
        name: argocd-initial-admin-secret
        kubeconfig: "{{ kubeconfig_path }}"
      register: argocd_secret
      failed_when: false

    - name: Decode admin password
      set_fact:
        admin_password: "{{ argocd_secret.resources[0].data.password | b64decode }}"
      when: argocd_secret.resources | length > 0
      no_log: false

    # ==================== Display Success Information ====================

    - name: Get all ArgoCD pods status
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ argocd_namespace }}"
        label_selectors:
          - app.kubernetes.io/part-of=argocd
        kubeconfig: "{{ kubeconfig_path }}"
      register: argocd_pods

    - name: Display ArgoCD pods status
      debug:
        msg: "{{ item.metadata.name }}: {{ item.status.phase }}"
      loop: "{{ argocd_pods.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: Display bootstrap complete message
      debug:
        msg: |
          ArgoCD Bootstrap Complete!

          GitOps Control Plane Status:
          --------------------------------
          ArgoCD has been installed and the root application has been applied.
          ArgoCD will now manage platform and application deployments from Git.

          Access ArgoCD UI:
          --------------------
          ArgoCD is running with ClusterIP (internal only).

          To access the UI:

          Port Forward (Recommended for initial setup):
             kubectl port-forward svc/argocd-server -n argocd 8080:443
          Then open: https://localhost:8080

          What Happens Next:
          ----------------------
          1. ArgoCD syncs applications from: {{ gitops_repo }}
          2. Platform services (ingress, monitoring, logging) deploy from Git
          3. Applications deploy from Git

          Management Responsibilities:
          ------------------------------
          - Ansible: Manages ArgoCD itself (install, upgrade)
          - ArgoCD: Manages platform and applications from Git

          To Upgrade ArgoCD:
          ---------------------
          1. Edit: argocd_bootstrap_version in this playbook
          2. Run: ansible-playbook 04-bootstrap-argocd.yml
